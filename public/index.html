<!doctype html>
<html lang="en" style="color-scheme: dark;">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="OpenClaw Telemetry & Agent Interface" />
  <title>Agent Home | OpenClaw</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <!-- Tactical Grid & Film Grain Filters -->
  <div class="ambient-grid"></div>
  <div class="ambient-noise"></div>

  <main id="app" class="dashboard" aria-live="polite">
    <!-- High-Tech Boot Sequence -->
    <section id="boot" class="boot-screen">
      <div class="loader-ring">
        <div class="loader-ring-inner"></div>
      </div>
      <div class="boot-text">
        <h1 class="font-sans">Establishing Uplink</h1>
        <p class="font-mono text-cyan">Awaiting telemetry streams...</p>
      </div>
    </section>

    <!-- Primary Mount -->
    <div id="app-mount" class="dashboard-mount hidden"></div>
  </main>

  <script type="module" src="./app.js"></script>
</body>

</html>
